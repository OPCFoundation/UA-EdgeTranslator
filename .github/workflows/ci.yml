name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  merge_group:

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true

jobs:
  line-endings:
    name: Line endings (LF)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Fail on CRLF in tracked text files
        shell: bash
        run: |
          # .gitattributes pins all text to eol=lf except *.bat / *.cmd.
          # Fail if any other tracked file has a CR byte in its blob.
          offenders="$(git grep --cached -Il $'\r' -- ':(exclude)*.bat' ':(exclude)*.cmd' || true)"
          if [ -n "$offenders" ]; then
            echo "::error::Tracked text files contain CRLF; run 'git add --renormalize .' and commit."
            echo "$offenders"
            exit 1
          fi
          echo "OK: no CRLF in tracked text files."

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        # Linux validates net10.0; Windows is required for the
        # net10.0-windows / net10.0-windows10.0.26100.0 TFMs and the
        # OPCDA driver.
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore UAEdgeTranslator.sln

      - name: Build
        run: dotnet build UAEdgeTranslator.sln -c Release --no-restore

      - name: Test
        run: dotnet test UAEdgeTranslator.sln -c Release --no-build --no-restore --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}
          path: '**/TestResults/*.trx'
          if-no-files-found: warn
