{{- if .Values.credentials.create -}}
{{- if .Values.credentials.existingSecret -}}
{{- fail "credentials.create and credentials.existingSecret are mutually exclusive; set only one." -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-credentials" (include "ua-edgetranslator.fullname" .) }}
  labels:
    {{- include "ua-edgetranslator.labels" . | nindent 4 }}
type: Opaque
stringData:
  OPCUA_USERNAME: {{ required "credentials.username is required when credentials.create=true" .Values.credentials.username | quote }}
  OPCUA_PASSWORD: {{ required "credentials.password is required when credentials.create=true" .Values.credentials.password | quote }}
  {{- range $key, $value := .Values.credentials.extraKeys }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
