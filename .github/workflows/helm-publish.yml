---
name: Helm Chart

# Lints and renders the chart on every change, and publishes it to the GHCR OCI
# registry on v*.*.* tags so the chart appVersion tracks the released server
# image tag (see docker-publish.yml / driver-pack.yml).

on:  # yamllint disable-line rule:truthy
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
    paths:
      - "deploy/helm/**"
      - ".github/workflows/helm-publish.yml"
  merge_group:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  CHART_DIR: deploy/helm/ua-edgetranslator

jobs:
  chart:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Lint chart
        run: helm lint "${CHART_DIR}"

      - name: Render chart (default values + CI presets)
        run: |
          set -euo pipefail
          echo "::group::helm template (default values)"
          helm template ua-edgetranslator "${CHART_DIR}" \
            --namespace ua-edgetranslator >/dev/null
          echo "::endgroup::"
          for f in "${CHART_DIR}"/ci/*-values.yaml; do
            echo "::group::helm template -f ${f}"
            helm template ua-edgetranslator "${CHART_DIR}" \
              --namespace ua-edgetranslator -f "${f}" >/dev/null
            echo "::endgroup::"
          done

      # GHCR/OCI requires lowercase path segments and the owner "OPCFoundation"
      # is mixed-case, so lowercase it before composing the registry reference.
      - name: Compute chart OCI registry
        id: oci
        run: |
          set -euo pipefail
          owner="${{ github.repository_owner }}"
          echo "repo=oci://${REGISTRY}/${owner,,}/charts" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login "${REGISTRY}" \
                --username "${{ github.actor }}" --password-stdin

      # On a v*.*.* tag, package with:
      #   chart version = tag without the leading "v" (strict SemVer, e.g. 1.2.3)
      #   app  version  = tag as published for the server image (e.g. v1.2.3)
      - name: Package and push chart
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          chart_version="${tag#v}"
          helm package "${CHART_DIR}" \
            --version "${chart_version}" \
            --app-version "${tag}"
          helm push "ua-edgetranslator-${chart_version}.tgz" "${{ steps.oci.outputs.repo }}"
