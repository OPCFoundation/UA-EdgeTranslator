---
name: Helm Chart

# Lints and renders the chart on every change, and publishes it to the GHCR OCI
# registry so the chart appVersion tracks the published server image tag (see
# docker-publish.yml / driver-pack.yml). Publishes on:
#   * v*.*.* tags   -> chart version = tag without "v" (e.g. 1.2.3),
#                      appVersion = tag (e.g. v1.2.3) => immutable images.
#   * pushes to main -> SemVer prerelease version
#                      (e.g. 0.1.0-main.<short-sha>), appVersion = main.
# Consumers resolve the latest prerelease with `--version '>=0.0.0-0'`; released
# tags keep resolving unchanged.

on:  # yamllint disable-line rule:truthy
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
    paths:
      - "deploy/helm/**"
      - ".github/workflows/helm-publish.yml"
  merge_group:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  CHART_DIR: deploy/helm/ua-edgetranslator

jobs:
  chart:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Lint chart
        run: helm lint "${CHART_DIR}"

      - name: Render chart (default values + CI presets)
        run: |
          set -euo pipefail
          echo "::group::helm template (default values)"
          helm template ua-edgetranslator "${CHART_DIR}" \
            --namespace ua-edgetranslator >/dev/null
          echo "::endgroup::"
          for f in "${CHART_DIR}"/ci/*-values.yaml; do
            echo "::group::helm template -f ${f}"
            helm template ua-edgetranslator "${CHART_DIR}" \
              --namespace ua-edgetranslator -f "${f}" >/dev/null
            echo "::endgroup::"
          done

      # GHCR/OCI requires lowercase path segments and the owner "OPCFoundation"
      # is mixed-case, so lowercase it before composing the registry reference.
      - name: Compute chart OCI registry
        id: oci
        run: |
          set -euo pipefail
          owner="${{ github.repository_owner }}"
          echo "repo=oci://${REGISTRY}/${owner,,}/charts" >> "$GITHUB_OUTPUT"

      # Strict SemVer is required for OCI push, so the raw branch name cannot be
      # used. On a v*.*.* tag we derive the version from the tag; on main we
      # publish a SemVer prerelease based on the chart's own version plus the
      # short commit SHA.
      - name: Compute chart version
        id: ver
        if: >-
          startsWith(github.ref, 'refs/tags/v')
          || github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          base="$(helm show chart "${CHART_DIR}" | awk '/^version:/ {print $2}')"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "chart=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "app=${GITHUB_REF_NAME}"     >> "$GITHUB_OUTPUT"
          else
            echo "chart=${base}-main.$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"
            echo "app=main"                                           >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        if: >-
          startsWith(github.ref, 'refs/tags/v')
          || github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login "${REGISTRY}" \
                --username "${{ github.actor }}" --password-stdin

      - name: Package and push chart
        if: >-
          startsWith(github.ref, 'refs/tags/v')
          || github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          chart_version="${{ steps.ver.outputs.chart }}"
          helm package "${CHART_DIR}" \
            --version "${chart_version}" \
            --app-version "${{ steps.ver.outputs.app }}"
          helm push "ua-edgetranslator-${chart_version}.tgz" "${{ steps.oci.outputs.repo }}"
