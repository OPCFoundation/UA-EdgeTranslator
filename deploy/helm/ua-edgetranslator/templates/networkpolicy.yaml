{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ua-edgetranslator.fullname" . }}
  labels:
    {{- include "ua-edgetranslator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ua-edgetranslator.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  {{- with .Values.networkPolicy.ingress }}
  ingress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
